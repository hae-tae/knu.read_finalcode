<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS TERMINAL — 빛의 속도로</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg: #04070f;
    --c-deep: #080d1a;
    --c-panel: #0b1220;
    --c-border: #1a2d4a;
    --c-glow: #1e5f8a;
    --c-accent: #3aafd4;
    --c-accent2: #0f4f6d;
    --c-text: #8ab8cc;
    --c-dim: #2a4a5e;
    --c-success: #2affb3;
    --c-danger: #ff3a5c;
    --c-warn: #ffb83a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
    --font-kr: 'Noto Sans KR', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--c-bg);
    color: var(--c-text);
    font-family: var(--font-mono);
    overflow: hidden;
  }

  @media (max-width: 600px) {
    html, body { overflow: auto; height: auto; min-height: 100%; }
  }

  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: var(--o, 0.4);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--o, 0.4); }
    50% { opacity: calc(var(--o, 0.4) * 0.2); }
  }

  .scanlines {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  }

  .shell {
    position: relative; z-index: 2; height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
  }
  @media (max-width: 600px) {
    .shell { height: auto; min-height: 100vh; padding: 56px 1rem 5rem; justify-content: flex-start; }
  }

  .statusbar {
    position: fixed; top: 0; left: 0; right: 0; height: 36px;
    background: var(--c-panel); border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 1.5rem; font-size: 10px; letter-spacing: 0.15em; color: var(--c-dim); z-index: 10;
  }
  @media (max-width: 400px) {
    .statusbar { padding: 0 0.75rem; font-size: 9px; letter-spacing: 0.08em; }
    .statusbar .blink { display: none; }
  }
  .statusbar .blink { color: var(--c-accent); animation: blink 1.2s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .status-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--c-accent); margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .terminal {
    width: 100%; max-width: 560px; background: var(--c-panel);
    border: 1px solid var(--c-glow); border-radius: 4px; overflow: hidden; position: relative;
  }
  .terminal::before {
    content: ''; position: absolute; inset: -1px; border-radius: 4px;
    border: 1px solid var(--c-glow); opacity: 0.3; pointer-events: none;
  }

  .terminal-bar {
    background: var(--c-deep); border-bottom: 1px solid var(--c-border);
    padding: 8px 1rem; display: flex; align-items: center; gap: 8px;
    font-size: 10px; letter-spacing: 0.12em; color: var(--c-dim);
  }
  .tbar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c-border); }
  .tbar-title {
    flex: 1; text-align: center; font-family: var(--font-display);
    font-size: 9px; letter-spacing: 0.25em; color: var(--c-accent);
  }

  .terminal-body { padding: 2rem 2rem 1.5rem; }
  @media (max-width: 480px) { .terminal-body { padding: 1.25rem 1rem 1rem; } }

  .main-title {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(18px, 4vw, 26px); letter-spacing: 0.2em;
    color: #ffffff; text-align: center; margin-bottom: 4px; line-height: 1.2;
  }
  .sub-title {
    font-family: var(--font-kr); font-weight: 300; font-size: 11px;
    letter-spacing: 0.25em; color: var(--c-dim); text-align: center; margin-bottom: 2rem;
  }

  .divider { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
  .divider-line { flex: 1; height: 1px; background: var(--c-border); }
  .divider-icon {
    width: 20px; height: 20px; border: 1px solid var(--c-glow);
    transform: rotate(45deg); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .divider-icon::after { content: ''; width: 6px; height: 6px; background: var(--c-accent); }

  .log-area {
    background: var(--c-bg); border: 1px solid var(--c-border); border-radius: 2px;
    padding: 0.75rem 1rem; margin-bottom: 1.5rem; min-height: 60px;
    font-size: 11px; line-height: 1.8; color: var(--c-dim); font-family: var(--font-mono);
  }
  .log-area .log-line { display: block; opacity: 0; animation: fadeIn 0.3s forwards; }
  .log-area .log-line.success { color: var(--c-success); }
  .log-area .log-line.danger  { color: var(--c-danger); }
  .log-area .log-line.info    { color: var(--c-accent); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .input-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 0.875rem; }
  .input-prefix {
    display: flex; align-items: center; color: var(--c-accent);
    font-size: clamp(10px, 2.5vw, 12px); white-space: nowrap; flex-shrink: 0; user-select: none;
  }
  .code-input {
    flex: 1; background: var(--c-bg); border: 1px solid var(--c-glow); border-radius: 2px;
    padding: 10px 14px; color: white; font-family: var(--font-display); font-size: 18px;
    letter-spacing: 0.3em; text-transform: uppercase; outline: none;
    transition: border-color 0.2s; -webkit-text-size-adjust: 100%;
  }
  @media (max-width: 480px) { .code-input { font-size: 16px; letter-spacing: 0.2em; padding: 10px; } }
  .code-input::placeholder { color: var(--c-dim); font-size: 12px; letter-spacing: 0.15em; font-family: var(--font-mono); }
  .code-input:focus { border-color: var(--c-accent); }

  .submit-btn {
    width: 100%; background: transparent; border: 1px solid var(--c-glow);
    color: var(--c-accent); font-family: var(--font-display); font-size: 11px;
    font-weight: 700; letter-spacing: 0.3em; padding: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    text-transform: uppercase; border-radius: 2px;
  }
  .submit-btn:hover { background: var(--c-accent2); border-color: var(--c-accent); color: white; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn.loading { color: var(--c-dim); pointer-events: none; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-6px); } 30% { transform: translateX(6px); }
    45% { transform: translateX(-4px); } 60% { transform: translateX(4px); }
    75% { transform: translateX(-2px); } 90% { transform: translateX(2px); }
  }
  .shake { animation: shake 0.45s ease-out; }

  @keyframes successFlash {
    0% { border-color: var(--c-glow); } 30% { border-color: var(--c-success); } 100% { border-color: var(--c-glow); }
  }
  .success-flash { animation: successFlash 1.2s ease-out; }

  @keyframes dangerFlash {
    0% { border-color: var(--c-glow); } 30% { border-color: var(--c-danger); } 100% { border-color: var(--c-glow); }
  }
  .danger-flash { animation: dangerFlash 0.8s ease-out; }

  .coord-display {
    position: fixed; bottom: 1.5rem; right: 1.5rem; font-size: 9px;
    letter-spacing: 0.1em; color: var(--c-border); text-align: right; line-height: 1.8; z-index: 10;
  }
  @media (max-width: 600px) { .coord-display { bottom: 0.5rem; right: 0.75rem; font-size: 8px; } }

  /* ── Overlays ── */
  .overlay {
    position: fixed; inset: 0; z-index: 20;
    display: none; align-items: center; justify-content: center;
    background: rgba(4,7,15,0.92);
  }
  .overlay.show { display: flex; }

  .overlay-box {
    text-align: center; padding: 3rem;
    border: 1px solid var(--c-success);
    background: var(--c-panel);
    animation: overlayIn 0.4s ease-out;
    margin: 1rem;
  }
  .overlay-box.fail { border-color: var(--c-danger); }

  @media (max-width: 480px) { .overlay-box { padding: 2rem 1.25rem; width: 100%; } }

  @keyframes overlayIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .overlay-title {
    font-family: var(--font-display); font-size: 22px; font-weight: 900;
    letter-spacing: 0.25em; color: var(--c-success); margin-bottom: 12px;
  }
  .overlay-title.fail { color: var(--c-danger); }
  @media (max-width: 480px) { .overlay-title { font-size: 16px; letter-spacing: 0.15em; } }

  .overlay-sub {
    font-family: var(--font-kr); font-size: 13px; font-weight: 300;
    color: var(--c-text); letter-spacing: 0.15em; line-height: 2;
  }
  .overlay-sub .mono {
    display: block; font-family: var(--font-mono);
    font-size: 10px; color: var(--c-dim); letter-spacing: 0.2em;
  }
</style>
</head>
<body>

<div class="stars" id="starfield"></div>
<div class="scanlines"></div>

<div class="statusbar">
  <span><span class="status-dot"></span>TERMINAL ACTIVE</span>
  <span class="blink">●</span>
  <span id="clock">00:00:00</span>
</div>

<div class="shell">
  <div class="terminal" id="terminal">
    <div class="terminal-bar">
      <div class="tbar-dot"></div>
      <div class="tbar-dot"></div>
      <div class="tbar-dot"></div>
      <div class="tbar-title"></div>
    </div>
    <div class="terminal-body">

      <div class="main-title">IF WE CANNOT GO<br>AT THE SPEED OF LIGHT</div>
      <div class="sub-title">우리가 빛의 속도로 갈 수 없다면</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon"></div>
        <div class="divider-line"></div>
      </div>

      <div class="log-area" id="logArea">
        <span class="log-line info">&gt; SYSTEM INITIALIZED</span>
        <span class="log-line info">&gt; AWAITING AUTHENTICATION...</span>
      </div>

      <div class="input-row">
        <div class="input-prefix">ACCESS_CODE://</div>
        <input
          class="code-input"
          id="codeInput"
          type="text"
          placeholder="enter code"
          maxlength="24"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        ▶ AUTHENTICATE
      </button>

    </div>
  </div>
</div>

<!-- 정답 오버레이 -->
<div class="overlay" id="overlaySuccess">
  <div class="overlay-box">
    <div class="overlay-title">ACCESS GRANTED</div>
    <div class="overlay-sub">
      코드 확인됨<br>
      탈출 성공<br>
      <span class="mono">TRAJECTORY LOCKED</span>
    </div>
  </div>
</div>

<!-- 오답 오버레이 -->
<div class="overlay" id="overlayFail">
  <div class="overlay-box fail">
    <div class="overlay-title fail">ACCESS DENIED</div>
    <div class="overlay-sub">
      인증 실패<br>
      탈출 불가<br>
      <span class="mono">CONNECTION TERMINATED</span>
    </div>
  </div>
</div>

<div class="coord-display">
  <div>LAT 37.5665°N</div>
  <div>LON 126.9780°E</div>
  <div>STARDATE 2386.7</div>
</div>

<audio id="rightSound" src="right.wav" preload="auto"></audio>
<audio id="wrongSound" src="wrong.mp3" preload="auto"></audio>

<script>
  // ─── 정답 코드를 바꾸려면: hash-generator.html을 열어 새 해시를 생성한 뒤
  //     아래 값만 교체하세요.
  const CORRECT_HASH = '703ed1885091b4f91252039c35a4a83274a03fe06a1a6e822b7ab1194f1d0b4c';
  // ────────────────────────────────────────────────────────────────────

  let done = false;

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // Star field
  const starfield = document.getElementById('starfield');
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() < 0.15 ? 2 : 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --o:${0.2 + Math.random()*0.6};
      --d:${2 + Math.random()*5}s;
      animation-delay:${Math.random()*5}s;
    `;
    starfield.appendChild(s);
  }

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Log
  function addLog(msg, type = 'info') {
    const area = document.getElementById('logArea');
    const line = document.createElement('span');
    line.className = `log-line ${type}`;
    line.style.animationDelay = '0s';
    line.textContent = msg;
    area.appendChild(line);
    while (area.children.length > 6) area.removeChild(area.firstChild);
  }

  // Web Audio fallback
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx;
  function ensureCtx() { if (!ctx) ctx = new AudioCtx(); return ctx; }

  function playSuccessTone() {
    try {
      const c = ensureCtx();
      [440, 554, 659, 880].forEach((freq, i) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.connect(gain); gain.connect(c.destination);
        osc.frequency.value = freq; osc.type = 'sine';
        const t = c.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.45);
      });
    } catch(e) {}
  }

  function playFailTone() {
    try {
      const c = ensureCtx();
      [[180,0],[160,0.18],[140,0.36]].forEach(([freq, delay]) => {
        const osc = c.createOscillator(), gain = c.createGain();
        osc.connect(gain); gain.connect(c.destination);
        osc.frequency.value = freq; osc.type = 'sawtooth';
        const t = c.currentTime + delay;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.15, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        osc.start(t); osc.stop(t + 0.3);
      });
    } catch(e) {}
  }

  // Submit handler
  async function handleSubmit() {
    if (done) return;
    const input = document.getElementById('codeInput');
    const val = input.value.trim().toLowerCase();
    if (!val) return;

    done = true;
    const btn = document.getElementById('submitBtn');
    const terminal = document.getElementById('terminal');
    input.disabled = true;
    btn.disabled = true;
    btn.classList.add('loading');

    const inputHash = await sha256(val);

    if (inputHash === CORRECT_HASH) {
      // ─── 정답 ───
      terminal.classList.add('success-flash');
      setTimeout(() => terminal.classList.remove('success-flash'), 1200);

      addLog('> AUTHENTICATION SUCCESSFUL', 'success');
      addLog('> ACCESS LEVEL: CLEARANCE-7', 'success');
      addLog('> DESTINATION CONFIRMED', 'success');

      setTimeout(() => document.getElementById('overlaySuccess').classList.add('show'), 800);
      setTimeout(() => {
        const a = document.getElementById('rightSound');
        a.currentTime = 0;
        a.play().catch(() => playSuccessTone());
      }, 2000);

    } else {
      // ─── 오답 ───
      terminal.classList.add('shake', 'danger-flash');
      setTimeout(() => terminal.classList.remove('shake', 'danger-flash'), 800);

      addLog(`> AUTH FAILED: "${val.toUpperCase()}"`, 'danger');
      addLog('> ACCESS DENIED', 'danger');

      setTimeout(() => document.getElementById('overlayFail').classList.add('show'), 800);
      setTimeout(() => {
        const a = document.getElementById('wrongSound');
        a.currentTime = 0;
        a.play().catch(() => playFailTone());
      }, 2000);
    }
  }

  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });

  window.addEventListener('load', () => {
    if (window.innerWidth > 600) document.getElementById('codeInput').focus();
  });
</script>
</body>
</html>
